# Deploy the static site to GitHub Pages.
#
# This replaces the "build from branch" mode in Settings → Pages.
# Why this exists
#   GitHub's classic Pages serving is slow to update (sometimes minutes)
#   and has a separate cache layer. The Actions deploy is direct, ~30s
#   end-to-end, and you get a clean run log per deploy.
#
# One-time setup on GitHub
#   Settings → Pages → Build and deployment → Source = "GitHub Actions".
#   (NOT "Deploy from a branch".)

name: deploy to pages

on:
  # Run whenever main changes…
  push:
    branches: [main]
  # …and let us trigger it by hand from the Actions tab.
  workflow_dispatch: {}

# GitHub Pages requires these specific permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue concurrent deploys; if a new one arrives while one is in
# flight, cancel the old. The site is fully static, so newest wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Generate manifest.json from the actual filesystem so the live
      # site doesn't need to call the GitHub Contents API (60 req/hr
      # rate limit per IP). Fails the build if a `dir:` directive
      # points at a non-existent folder, so typos surface immediately
      # instead of producing silent blank pages.
      - name: build manifest
        run: python3 scripts/build-manifest.py

      # Stage only the files the site actually needs to a clean dist/
      # directory and upload that. This prevents non-site artefacts —
      # build scripts, design bundles, local docs, accidentally
      # committed zips, uploaded sources — from being published to the
      # live URL. Add a path here when you add a new top-level folder
      # the runtime depends on.
      - name: assemble dist/
        run: |
          set -eu
          mkdir -p dist
          cp index.html app.js md.js content.md manifest.json sitemap.xml robots.txt .nojekyll dist/
          cp -r content photos dist/

      - name: package site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
